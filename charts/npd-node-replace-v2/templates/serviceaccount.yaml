{{- if .Values.sa.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: npd-node-replace-sa
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "npd-node-replace-v2.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.sa.serviceAccount.annotations | nindent 4 }}
{{- end }}
